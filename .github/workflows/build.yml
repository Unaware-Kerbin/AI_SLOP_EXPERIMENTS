name: Build EXE
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pygame sounddevice numpy pynput pyinstaller
      - run: pyinstaller --onefile --windowed --name SoundDrop soundboard.py
      - uses: actions/upload-artifact@v4
        with:
          name: SoundDrop-exe
          path: dist/SoundDrop.exe
